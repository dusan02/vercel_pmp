name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Unit & Integration Tests (TZ=${{ matrix.timezone }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        timezone: ["UTC", "America/New_York", "Europe/Prague"]
    env:
      DATABASE_URL: "file:./test.db"
      TZ: ${{ matrix.timezone }}
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm test

      - name: Run coverage
        if: matrix.timezone == 'UTC'
        run: npm run test:coverage

      - name: Upload coverage
        if: matrix.timezone == 'UTC'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  smoke-test:
    name: Build & Smoke Test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./prisma/data/dev.db"
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build
      
      - name: Run pre-deploy specific tests
        run: npm test -- src/__tests__/pre-deploy.test.ts
      
      - name: Start app & verify endpoints
        run: |
          npm run dev &
          sleep 30
          curl -f http://localhost:3000/api/stocks || exit 1
          curl -f http://localhost:3000/api/health || exit 1
      
      - name: Verify Redis fallback
        run: |
          REDIS_URL=invalid npm run build

  test-critical:
    name: Critical Pricing Logic Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./test.db"
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run critical unit tests (first pass)
        run: npm test -- --testPathPatterns="priceResolver|pricingStateMachine"

      - name: Run critical unit tests (second pass - non-flaky check)
        run: npm test -- --testPathPatterns="priceResolver|pricingStateMachine"

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run integration tests
        run: npm test -- --testPathPatterns="polygonWorker.integration"
