name: Pre-Deploy Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run type checking
      run: npm run build
    
    - name: Run pre-deploy tests
      run: npm test -- src/__tests__/pre-deploy.test.ts
    
    - name: Test API endpoints
      run: |
        npm run dev &
        sleep 30
        curl -f http://localhost:3000/api/stocks || exit 1
        curl -f http://localhost:3000/api/health || exit 1
    
    - name: Check Redis fallback
      run: |
        # Test that app works without Redis
        REDIS_URL=invalid npm run build
